<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title> Nexus | 我的专属知识中枢</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- 引入 vue 主题，自带好看的侧边栏和响应式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 自定义一些酷炫的苹果风色彩 */
    :root {
      --theme-color: #0066cc;
      --sidebar-background: #f4f5f9;
      --sidebar-nav-link-color--active: #0066cc;
      --search-input-border-color: #0066cc;
    }
    
    /* 修复移动端（如 iPhone 17 Pro）左下角汉堡菜单按钮太靠下难以注意到的问题 */
    .sidebar-toggle {
      background-color: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50% !important;
      width: 50px !important;
      height: 50px !important;
      bottom: 40px !important;
      left: 20px !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      animation: pulse-shadow 2s infinite;
      z-index: 999;
    }
    
    .sidebar-toggle span {
      background-color: var(--theme-color) !important;
      margin-bottom: 4px !important;
    }
    
    /* 为按钮增加呼吸灯发光动画，强力吸引用户点击 */
    @keyframes pulse-shadow {
      0% { box-shadow: 0 0 0 0 rgba(0, 102, 204, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(0, 102, 204, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 102, 204, 0); }
    }
    
    /* 提示用户点击的文字浮窗（仅在移动端显示） */
    @media screen and (max-width: 768px) {
      .sidebar-toggle::before {
        content: "展开目录 / 搜索";
        position: absolute;
        left: 60px;
        white-space: nowrap;
        background: var(--theme-color);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        opacity: 0;
        animation: show-hint 4s forwards;
        animation-delay: 2s; /* 延迟2秒出现 */
        pointer-events: none;
      }
      
      /* 小提示出现几秒后消失，避免遮挡内容 */
      @keyframes show-hint {
        0%, 100% { opacity: 0; transform: translateX(-10px); }
        10%, 90% { opacity: 1; transform: translateX(0); }
      }
    }
    
    .sidebar-nav li>a { font-weight: 500; }
    .sidebar-nav > ul > li > a { font-weight: 700; color: #1d1d1f; }
    
    /* 让名称带有渐变色彩 */
    .app-name { 
      font-size: 24px !important;
      font-weight: 800;
      background: linear-gradient(135deg, #0066cc, #00aaff, #8e44ad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    
    .markdown-section h1 { letter-spacing: -1px; font-weight: 800; }
    .markdown-section h2 { border-bottom: none; font-weight: 700; color: #1d1d1f; }
    .markdown-section code { background: #f0f0f5; color: #d93b3b; }
    .markdown-section pre>code { color: #d4d4d4; }
    
    /* 【新增】强制覆盖 Docsify 默认内容区最大宽度，让 AppleWeb 卡片布局能在大屏上铺开 */
    .markdown-section {
      max-width: 1200px !important;
      padding: 30px 15px 40px 15px !important;
    }
  </style>
</head>
<body>
  <div id="app">正在启动 Nexus 知识引擎...</div>
  
  <script>
    window.$docsify = {
      name: ' Nexus', // 酷炫的名字
      repo: '',
      loadSidebar: false, // 【关闭】加载左侧边栏，启用全屏沉浸式卡片布局
      hideSidebar: true,  // 【隐藏】自带的侧边栏组件
      subMaxLevel: 2,    
      auto2top: true,    // 切换页面自动回到顶部
      
      // 全局搜索插件配置
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 搜索问题、方案或设备... (支持模糊匹配)',
        noData: '🤔 暂未找到相关记录，请尝试其他关键词',
        depth: 6,
        hideOtherSidebarContent: false,
        namespace: 'nexus-kb',
      },
      
      // 拷贝代码插件配置
      copyCode: {
        buttonText : '复制代码',
        errorText  : '复制失败',
        successText: '复制成功!'
      }
    }
  </script>
  
  <!-- Docsify 核心脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 全文搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 图片缩放插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <!-- 代码一键复制插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Emoji 解析插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
</body>
</html>
