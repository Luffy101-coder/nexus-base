<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title> Nexus | 我的专属知识中枢</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- 引入 vue 主题，自带好看的侧边栏和响应式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 自定义一些酷炫的苹果风色彩 */
    :root {
      --theme-color: #0066cc;
      --sidebar-background: #f4f5f9;
      --sidebar-nav-link-color--active: #0066cc;
      --search-input-border-color: #0066cc;
    }
    
    .sidebar-nav li>a { font-weight: 500; }
    .sidebar-nav > ul > li > a { font-weight: 700; color: #1d1d1f; }
    
    /* 让名称带有渐变色彩 */
    .app-name { 
      font-size: 24px !important;
      font-weight: 800;
      background: linear-gradient(135deg, #0066cc, #00aaff, #8e44ad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    
    .markdown-section h1 { letter-spacing: -1px; font-weight: 800; }
    .markdown-section h2 { border-bottom: none; font-weight: 700; color: #1d1d1f; }
    .markdown-section code { background: #f0f0f5; color: #d93b3b; }
    .markdown-section pre>code { color: #d4d4d4; }
  </style>
</head>
<body>
  <div id="app">正在启动 Nexus 知识引擎...</div>
  
  <script>
    window.$docsify = {
      name: ' Nexus', // 酷炫的名字
      repo: '',
      loadSidebar: true, // 加载侧边栏 _sidebar.md
      subMaxLevel: 2,    // 侧边栏层级
      auto2top: true,    // 切换页面自动回到顶部
      
      // 全局搜索插件配置
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 搜索问题、方案或设备... (支持模糊匹配)',
        noData: '🤔 暂未找到相关记录，请尝试其他关键词',
        depth: 6,
        hideOtherSidebarContent: false,
        namespace: 'nexus-kb',
      },
      
      // 拷贝代码插件配置
      copyCode: {
        buttonText : '复制代码',
        errorText  : '复制失败',
        successText: '复制成功!'
      }
    }
  </script>
  
  <!-- Docsify 核心脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 全文搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 图片缩放插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <!-- 代码一键复制插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Emoji 解析插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
</body>
</html>
